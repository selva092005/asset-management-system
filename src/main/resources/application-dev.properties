spring.application.name=demo

# ===============================
# = DATABASE CONFIG (MySQL)
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/asset_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# = SERVER PORT
# ===============================

server.port=8080

# ===============================
# = SWAGGER / SPRINGDOC
# ===============================

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.learn.demo.controller

# ===============================
# = DEV TOOLS
# ===============================

spring.devtools.restart.log-condition-evaluation-delta=false

# ===============================
# = JWT CONFIG
# ===============================

jwt.secret=DevOnlySecretKey@2025AssetManagementXYZ!!MustBe32Chars
jwt.refresh-secret=DevOnlyRefreshSecret@2025AssetMgmtXYZ!!MustBe32Chars

# ===============================
# = FRONTEND URL
# ===============================

app.frontend-url=http://localhost:5173
app.backend-url=http://localhost:8080

# ===============================
# = FILE UPLOAD CONFIG
# ===============================

file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# = MAILTRAP SMTP CONFIG
# ===============================
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=aa8eb56e302c23
spring.mail.password=d8337ba6f67b8a
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.write-timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
