spring.application.name=demo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# = DATABASE CONFIG (MySQL)
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/asset_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# = SERVER PORT
# ===============================

server.port=8080

# ===============================
# = SWAGGER / SPRINGDOC
# ===============================

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.learn.demo.controller

# ===============================
# = DEV TOOLS
# ===============================

spring.devtools.restart.log-condition-evaluation-delta=false

# ===============================
# = JWT CONFIG
# ===============================

# Set JWT_SECRET env variable in production — no fallback allowed
jwt.secret=${JWT_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}

# ===============================
# = FRONTEND URL (used in QR code generation)
# ===============================

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.backend-url=${BACKEND_URL:http://localhost:8080}

# ===============================
# = FILE UPLOAD CONFIG
# ===============================

file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# = CRON SCHEDULER CONFIGS
# ===============================

# Allocate 5 background threads to prevent jobs from blocking each other
spring.task.scheduling.pool.size=5

# 1. Daily overdue asset check (runs every morning at 8:00 AM)
app.cron.overdue-check=0 0 8 * * *

# app.cron.overdue-check=0/10 * * * * *  every 10 sec

# 2. Monthly read notifications db cleanup (runs on the 1st of every month at midnight)
app.cron.db-cleanup=0 0 0 1 * *

# 3. Weekly uploads directory cleanup (runs every Sunday at midnight)
app.cron.disk-cleanup=0 0 0 * * SUN
